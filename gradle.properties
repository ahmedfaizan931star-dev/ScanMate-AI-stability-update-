# Project-wide Gradle settings optimized for Android Studio and Google Colab.
org.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=768m -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true
org.gradle.workers.max=2
kotlin.code.style=official
kotlin.compiler.execution.strategy=in-process
android.useAndroidX=true
android.nonTransitiveRClass=true
android.nonFinalResIds=false

# Stable default build target. Override from Colab with:
# ./gradlew assembleDebug -PSCANMATE_COMPILE_SDK=36 -PSCANMATE_TARGET_SDK=36
SCANMATE_COMPILE_SDK=35
SCANMATE_TARGET_SDK=35
VERSION_CODE=5
VERSION_NAME=1.5.0
