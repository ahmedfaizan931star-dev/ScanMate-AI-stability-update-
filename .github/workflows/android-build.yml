name: Build ScanMate AI Pro APK and AAB

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Android Debug APK, Release APK, and Release AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Android project directory
        id: detect
        shell: bash
        run: |
          set -e

          echo "Searching for Android Gradle project..."

          SETTINGS_FILE="$(find "$GITHUB_WORKSPACE" -maxdepth 6 -type f \( -name "settings.gradle" -o -name "settings.gradle.kts" \) \
            -not -path "*/.git/*" \
            -not -path "*/.gradle/*" \
            -not -path "*/build/*" \
            | head -n 1)"

          if [ -z "$SETTINGS_FILE" ]; then
            echo "No settings.gradle or settings.gradle.kts found."
            find "$GITHUB_WORKSPACE" -maxdepth 4 -type f | sort
            exit 1
          fi

          PROJECT_DIR="$(dirname "$SETTINGS_FILE")"

          if [ ! -f "$PROJECT_DIR/gradlew" ]; then
            echo "gradlew not found beside settings file: $PROJECT_DIR"
            find "$GITHUB_WORKSPACE" -name gradlew -type f -print
            exit 1
          fi

          if [ "$PROJECT_DIR" = "$GITHUB_WORKSPACE" ]; then
            REL_PROJECT_DIR="."
          else
            REL_PROJECT_DIR="${PROJECT_DIR#${GITHUB_WORKSPACE}/}"
          fi

          echo "Android project directory: $REL_PROJECT_DIR"
          echo "project_dir=$REL_PROJECT_DIR" >> "$GITHUB_OUTPUT"

      - name: Repair Gradle Wrapper JAR
        working-directory: ${{ steps.detect.outputs.project_dir }}
        shell: bash
        run: |
          set -e

          WRAPPER_PROPS="gradle/wrapper/gradle-wrapper.properties"
          WRAPPER_JAR="gradle/wrapper/gradle-wrapper.jar"

          if [ ! -f "$WRAPPER_PROPS" ]; then
            echo "Missing $WRAPPER_PROPS"
            exit 1
          fi

          GRADLE_VERSION="$(sed -nE 's/.*gradle-([0-9]+(\.[0-9]+)*(-[A-Za-z0-9.]+)?)-.*\.zip.*/\1/p' "$WRAPPER_PROPS" | head -n 1)"

          if [ -z "$GRADLE_VERSION" ]; then
            echo "Could not detect Gradle version from gradle-wrapper.properties"
            cat "$WRAPPER_PROPS"
            exit 1
          fi

          echo "Detected Gradle version: $GRADLE_VERSION"

          mkdir -p gradle/wrapper

          curl -fsSL "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-wrapper.jar" -o "$WRAPPER_JAR"
          curl -fsSL "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-wrapper.jar.sha256" -o "$WRAPPER_JAR.sha256"

          EXPECTED_SHA="$(cat "$WRAPPER_JAR.sha256" | tr -d '[:space:]')"
          ACTUAL_SHA="$(sha256sum "$WRAPPER_JAR" | awk '{print $1}')"

          echo "Expected SHA: $EXPECTED_SHA"
          echo "Actual SHA:   $ACTUAL_SHA"

          if [ "$EXPECTED_SHA" != "$ACTUAL_SHA" ]; then
            echo "Gradle wrapper jar checksum mismatch"
            exit 1
          fi

          chmod +x ./gradlew

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Show Gradle version
        working-directory: ${{ steps.detect.outputs.project_dir }}
        run: ./gradlew --version

      - name: Clean project
        working-directory: ${{ steps.detect.outputs.project_dir }}
        run: ./gradlew clean --no-daemon --stacktrace

      - name: Build Debug APK
        working-directory: ${{ steps.detect.outputs.project_dir }}
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        working-directory: ${{ steps.detect.outputs.project_dir }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Build Release AAB
        working-directory: ${{ steps.detect.outputs.project_dir }}
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ScanMate-AI-Pro-debug-apk
          path: ${{ steps.detect.outputs.project_dir }}/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ScanMate-AI-Pro-release-apk
          path: ${{ steps.detect.outputs.project_dir }}/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: ScanMate-AI-Pro-release-aab
          path: ${{ steps.detect.outputs.project_dir }}/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
